<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>

<style>

body{
    background-color:#d4caa8;
    font-family: Arial, Helvetica, sans-serif;
    text-align:center;
    padding-top:80px;
}

.container-box{
    background:#1f2430;
    width:450px;
    margin:auto;
    padding:40px;
    border-radius:30px;
    color:white;
    box-shadow:0px 5px 15px rgba(0,0,0,0.3);
}

input{
    width:80%;
    padding:10px;
    margin-top:15px;
    border-radius:8px;
    border:none;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background-color:#ffc107;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background-color:#e0a800;
}

</style>
    
</head>
<body>

<h1>Electricity Consumption Classifier</h1>

<div class="container-box">

<input type="text" id="kwh" placeholder="Enter kWh">
<br>

<button onclick="classify()">Consumption Classification</button>

</div>

<script>

function classify(){

var kwh = document.getElementById("kwh").value;

if(isNaN(kwh) || kwh < 0){
    alert("Please input a valid number.");
}

else if(kwh < 100){
    alert("Lifeline Consumer: Discounted electricity rates.");
}

else if(kwh < 200){
    alert("Low Consumption: Normal residential rate.");
}

else if(kwh < 300){
    alert("Average Consumption: Typical electricity usage.");
}

else if(kwh < 500){
    alert("High Consumption: Higher electricity usage.");
}

else{
    alert("Very High Consumption: Heavy electricity users.");
}

}

</script>

</body>
</html>
